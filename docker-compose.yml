version: '3.8'

services:
  backend:
    build:
      context: ./backend
      args:
        - FLASK_ENV=production
    env_file:
      - ./backend/.env.production
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
    environment:
      - NODE_ENV=production

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: prod_user
      POSTGRES_PASSWORD: prod_password
      POSTGRES_DB: palace_of_goods_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:

version: '3.8'
services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - ./backend:/app
    command: "node server.js"

  ml:
    build:
      context: ./ml
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URI=sqlite:///ml.db
    volumes:
      - ./ml:/app
    command: "python main.py"
