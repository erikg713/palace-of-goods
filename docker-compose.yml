version: '3.8'

services:
  backend:
    build:
      context: ./backend
      args:
        - FLASK_ENV=production
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    volumes:
      - ./backend:/app
    depends_on:
      - db
    command: "flask run --host=0.0.0.0 --port=5000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./frontend:/app
    command: "npm start"

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: prod_user
      POSTGRES_PASSWORD: prod_password
      POSTGRES_DB: palace_of_goods_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  ml:
    build:
      context: ./ml
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URI=sqlite:///ml.db
    volumes:
      - ./ml:/app
    command: "python main.py"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
