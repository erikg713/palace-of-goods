<!DOCTYPE html>
<html lang="en">
<head>
    </head>
<body>
    <h1>Welcome to Palace of Goods</h1>
    <button onclick="authenticateUser()">Sign In with Pi</button>
    <button onclick="initiatePayment()">Pay with Pi</button>

    <script>
        // ...

        function authenticateUser() {
            // ...

            Pi.authenticate(scopes, onIncompletePaymentFound).then(function(auth) {
                console.log("Authentication successful!");
                localStorage.setItem('accessToken', auth.accessToken); // Store securely
                // ...
            }).catch(function(error) {
                // ...
                alert("Authentication failed. Please try again.");
            });
        }

        function initiatePayment() {
            // ...

            Pi.createPayment(paymentData, paymentCallbacks)
                .then(function(payment) {
                    console.log("Payment initiated:", payment);
                    // Display a loading indicator or success message
                })
                .catch(function(error) {
                    console.error("Error initiating payment:", error);
                    alert("Payment failed. Please try again.");
                });
        }
    </script>
</body>
</html>
